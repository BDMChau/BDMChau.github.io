<div class="wrap">
  <div class="route" [@routeAnimations]="prepareRoute(outlet)">
    <router-outlet #outlet=outlet></router-outlet>
  </div>

  <div class="toggle-theme">
    <div [class]="isDark ? 'dark' : 'toggler'" (click)="toggleTheme()"></div>
  </div>

  <div id="particles-js"></div>
</div>
